<!-- index.html password-generator-app -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>
    <div class="container">
        <div class="header">
            <h1>Password Generator</h1>
        </div>

        <div class="password-box">
            <div class="password-wrapper">
                <input type="text" id="password-input" readonly placeholder="You password will appear here">
                <button id="copyBtn">Copy</button>
            </div>
        </div>

        <div class="settings">
            <div class="length-control">
                <label>Password Length: <span id="lengthValue">12</span></label>
                <input type="range" id="lengthSlider" min="4" max="32" value="12">
            </div>
        </div>

        <fieldset>
            <legend>Include characters:</legend>
            <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
            <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols" checked> Symbols</label>
        </fieldset>

        <div class="generate-btn-wrapper">
            <button id="generateBtn">Generate Password</button>
        </div>

    </div>

    <script src="script.js"></script>
 </body>
 </html>
